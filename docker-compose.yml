x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata-db/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""
    DB_CONN_STRING: ${DB_CONN_STRING}
    _PIP_ADDITIONAL_REQUIREMENTS: pandas numpy sqlalchemy psycopg2-binary pyarrow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/dags/../src
    - ./data:/opt/airflow/data
    - airflow_logs:/opt/airflow/logs
  depends_on:
    - airflow-metadata-db

services:
  # Metadata DB for Airflow's own scheduler state - NOT the pipeline's target DB.
  # The pipeline writes to RDS (or local target Postgres) via DB_CONN_STRING.
  airflow-metadata-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_metadata:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - "airflow db migrate && airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

volumes:
  airflow_metadata:
  airflow_logs:
